<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#fafaf8">
<meta name="robots" content="noindex, follow">
<title>Page not found — Ember &amp; Frames</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{background:#fafaf8;color:#18181a;font-family:'DM Sans',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;padding:40px 24px;min-height:100dvh;}
  main{text-align:center;max-width:520px;}
  .code{font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-weight:500;font-size:clamp(72px,14vw,120px);color:#c97b3a;line-height:1;}
  h1{font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:clamp(28px,4vw,42px);letter-spacing:0;margin:12px 0 16px;color:#18181a;}
  p{color:#6b6b63;font-size:15px;line-height:1.6;margin-bottom:32px;}
  a.btn{display:inline-block;padding:14px 32px;background:#18181a;color:#fafaf8;text-decoration:none;font-family:'DM Sans',system-ui,sans-serif;font-weight:600;font-size:11px;letter-spacing:0.22em;text-transform:uppercase;border-radius:40px;transition:background .2s;}
  a.btn:hover{background:#c97b3a;}
</style>
</head>
<body>
<main>
  <div class="code">404</div>
  <h1>This frame hasn&rsquo;t developed.</h1>
  <p>The page you&rsquo;re looking for has moved, been renamed, or never existed. Head back to the index to find what you&rsquo;re after.</p>
  <a class="btn" href="/">Return home</a>
</main>
</body>
</html>
