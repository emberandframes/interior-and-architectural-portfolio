    /* === THEME BAKED IN PER FILE =========================================== */
    const THEME = 'light';

    const { useState, useEffect, useRef, useCallback } = React;
    const { PHOTOS, PROJECTS, PROJECT_ORDER, SITE } = window.PORTFOLIO_DATA;

    /* === Hooks ============================================================ */
    function useProgressBar(frameRef) {
      useEffect(() => {
        const bar = document.getElementById('progressbar');
        const el = frameRef.current;
        if (!bar || !el) return;
        function tick() {
          const max = el.scrollHeight - el.clientHeight;
          const p = max > 0 ? el.scrollTop / max : 0;
          bar.style.transform = 'scaleX(' + p + ')';
        }
        el.addEventListener('scroll', tick, { passive: true });
        tick();
        return () => el.removeEventListener('scroll', tick);
      }, [frameRef]);
    }

    function useRevealOnScroll(frameRef) {
      useEffect(() => {
        const root = frameRef.current;
        if (!root) return;
        const io = new IntersectionObserver(
          (entries) => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); }),
          { root, rootMargin: '0px 0px 80px 0px', threshold: 0 }
        );
        root.querySelectorAll('.reveal').forEach(el => io.observe(el));
        window.requestAnimationFrame(() => {
          const rb = root.getBoundingClientRect();
          root.querySelectorAll('.reveal:not(.in)').forEach(el => {
            const r = el.getBoundingClientRect();
            if (r.top < rb.bottom + 80 && r.bottom > rb.top - 80) el.classList.add('in');
          });
        });
        return () => io.disconnect();
      }, [frameRef]);
    }

    function useColumnCount() {
      const compute = () => {
        if (typeof window === 'undefined') return 3;
        const w = window.innerWidth;
        if (w <= 480) return 1;
        if (w <= 768) return 2;
        return 3;
      };
      const [n, setN] = useState(compute);
      useEffect(() => {
        let raf = 0;
        const onResize = () => {
          cancelAnimationFrame(raf);
          raf = requestAnimationFrame(() => setN(compute()));
        };
        window.addEventListener('resize', onResize);
        return () => { window.removeEventListener('resize', onResize); cancelAnimationFrame(raf); };
      }, []);
      return n;
    }

    /* === Icons (inline SVG) ============================================== */
    function ChevronDown({ size = 14 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">

    }
    function ChevronLeft({ size = 22 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          <polyline points="15 18 9 12 15 6" />

      );
    }
    function ChevronRight({ size = 22 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          <polyline points="9 18 15 12 9 6" />

      );
    }
    function CloseX({ size = 18 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          <line x1="6" y1="6" x2="18" y2="18" />
          <line x1="18" y1="6" x2="6" y2="18" />

      );
    }
    function ArrowUpRight({ size = 14 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">

          <polyline points="8 7 17 7 17 16" />

      );

    /* === Lightbox ========================================================= */
    function Lightbox({ photos, index, onClose, onNav }) {
      const touchRef = useRef(null);

      useEffect(() => {
        function onKey(e) {
          if (e.key === 'Escape')     onClose();
          if (e.key === 'ArrowLeft')  onNav(-1);
          if (e.key === 'ArrowRight') onNav(1);
        }
        window.addEventListener('keydown', onKey);
        document.body.style.overflow = 'hidden';
        return () => {
          window.removeEventListener('keydown', onKey);
          document.body.style.overflow = '';
        };
      }, [onClose, onNav]);

      // Swipe navigation for touch devices.
      const onTouchStart = useCallback((e) => {
        const t = e.touches[0];
        touchRef.current = { x: t.clientX, y: t.clientY, t: Date.now() };
      }, []);
      const onTouchEnd = useCallback((e) => {
        const start = touchRef.current;
        touchRef.current = null;
        if (!start) return;
        const t = e.changedTouches[0];
        const dx = t.clientX - start.x;
        const dy = t.clientY - start.y;
        // Treat as a horizontal swipe when it's mostly horizontal and long enough.
        if (Math.abs(dx) > 45 && Math.abs(dx) > Math.abs(dy) * 1.5) {
          onNav(dx < 0 ? 1 : -1);
        }
      }, [onNav]);

      if (index == null) return null;
      const p = photos[index];

      return (
        <div
          className="lightbox"
          onClick={onClose}
          role="dialog"
          aria-modal="true"
          aria-label={p.caption}
        >
          <button className="lb-btn close" onClick={(e) => { e.stopPropagation(); onClose(); }} aria-label="Close"><CloseX size={20} /></button>
          <button className="lb-btn prev"  onClick={(e) => { e.stopPropagation(); onNav(-1); }} aria-label="Previous"><ChevronLeft size={26} /></button>
          <button className="lb-btn next"  onClick={(e) => { e.stopPropagation(); onNav(1);  }} aria-label="Next"><ChevronRight size={26} /></button>
          <div className="lb-counter">{String(index + 1).padStart(2, '0')} / {String(photos.length).padStart(2, '0')}</div>
          <div
            className="lb-img-wrap"
            onClick={(e) => e.stopPropagation()}
            onTouchStart={onTouchStart}
            onTouchEnd={onTouchEnd}
          >
            <img className="lb-img" src={p.src} alt={p.caption} draggable={false} onContextMenu={(e) => e.preventDefault()} />
            <div className="lb-watermark" aria-hidden="true">© <Wordmark name={SITE.name} ampClass="wm-amp" /></div>
          </div>
        </div>
      );
    }

    /* === Brand wordmark (amber italic swash ampersand) =================== */
    function Wordmark({ name, ampClass }) {
      // Split the name on "&" and wrap the ampersand in an amber italic swash.
      // Names without an ampersand (e.g. a personal name) render unchanged.
      const parts = (name || '').split('&');
      if (parts.length < 2) return name;
      return (
        <React.Fragment>
          {parts[0].replace(/\s+$/, '')}
          <span className={ampClass}>&amp;</span>
          {parts.slice(1).join('&').replace(/^\s+/, '')}
        </React.Fragment>
      );
    }

    function BrandName({ name }) {
      return <Wordmark name={name} ampClass="brand-amp" />;
    }

    /* === Header (no theme toggle in single-theme files) =================== */
    function Header() {
      const [menuOpen, setMenuOpen] = useState(false);
      const closeMenu = () => setMenuOpen(false);
      return (

          <a href="#top" className="brand" onClick={closeMenu}>
            <BrandName name={SITE.name} />
            <span className="discipline">· {SITE.discipline}</span>
          </a>
          <button
            type="button"
            className="nav-toggle"
            aria-label={menuOpen ? 'Close menu' : 'Open menu'}
            aria-expanded={menuOpen}
            aria-controls="primary-nav"
            onClick={() => setMenuOpen(o => !o)}
          >
            <span className="nav-toggle-bar"></span>
            <span className="nav-toggle-bar"></span>
            <span className="nav-toggle-bar"></span>
          </button>
          <nav id="primary-nav" aria-label="Primary">
            <a href="#work" onClick={closeMenu}>Work</a>
            <a href="#about" onClick={closeMenu}>About</a>
            <a href="#contact" onClick={closeMenu}>Contact</a>
            <a href="#enquire" onClick={closeMenu}>Enquire</a>
          </nav>
        </header>
      );
    }

    /* === Hero ============================================================= */
    function Hero() {
      const heroId = THEME === 'dark' ? SITE.heroPhotoDark : SITE.heroPhotoLight;
      const photo  = PHOTOS.find(p => p.id === heroId) || PHOTOS[0];
      const heroImgRef = useRef(null);
      const [heroLoaded, setHeroLoaded] = useState(false);

      // The hero sits on its own compositor layer (.bg has will-change:transform).
      // On some browsers that layer is not repainted when the image finishes
      // decoding, so the photo stays blank until a scroll/click forces an update.
      // Decode the image explicitly, then flip a state flag to force a repaint.
      useEffect(() => {
        const img = heroImgRef.current;
        if (!img) return;
        let cancelled = false;
        const reveal = () => { if (!cancelled) setHeroLoaded(true); };
        if (img.complete && img.naturalWidth) {
          reveal();
        } else if (typeof img.decode === 'function') {
          img.decode().then(reveal).catch(reveal);
        }
      }, []);

      return (
        <section className="hero" id="top">
          <div className="bg">
            <img
              ref={heroImgRef}
              className={heroLoaded ? 'is-loaded' : ''}
              src={photo.src}
              alt=""
              loading="eager"
              decoding="async"
              fetchpriority="high"
              draggable={false}
              onLoad={() => setHeroLoaded(true)}
              onContextMenu={(e) => e.preventDefault()}
            />
          </div>
          <div className="scrim" />
          <div className="content">
            <div className="hero-block">
              <h1 className="reveal">
                {SITE.title1}<br />
                <span className="accent-italic italic">{SITE.title2}</span>
              </h1>
              <p className="tagline reveal">{SITE.tagline}</p>
              <p className="about-line reveal">{SITE.shortAbout}</p>
              <a href="#work" className="cta reveal">View the work <ArrowUpRight size={13} /></a>
            </div>
          </div>
        </section>
      );
    }

    /* === Balanced JS masonry (places each photo into the shortest column) */
    function BalancedMasonry({ id, photos, onPhotoClick }) {
      // Keep image sizing consistent across projects — always use the
      // viewport's natural column count (desktop = 3, tablet = 2, phone = 1).
      const columns = useColumnCount();
      const [cols, setCols] = useState(null);

      useEffect(() => {
        let cancelled = false;
        setCols(null);
        const ratios = new Array(photos.length).fill(null);
        let pending = photos.length;

        const finalize = () => {
          if (cancelled) return;
          // Tallest-first greedy: sort by ratio desc for placement decisions,
          // then sort each column's items by original index to keep display order.
          const indexed = photos.map((p, i) => ({ p, i, r: ratios[i] || 1.25 }));
          const sorted = [...indexed].sort((a, b) => b.r - a.r);
          const buckets = Array.from({ length: columns }, () => ({ h: 0, items: [] }));
          sorted.forEach((entry) => {
            const min = buckets.reduce((a, b) => a.h <= b.h ? a : b);
            min.items.push(entry);
            min.h += entry.r;
          });
          setCols(buckets.map(b => b.items.sort((a, b) => a.i - b.i).map(e => e.p)));
        };

        const settle = (i, w, h) => {
          if (cancelled) return;
          ratios[i] = (h && w) ? (h / w) : 1.25;
          pending -= 1;
          if (pending <= 0) finalize();
        };

        photos.forEach((p, i) => {
          const probe = new Image();
          probe.onload  = () => settle(i, probe.naturalWidth, probe.naturalHeight);
          probe.onerror = () => settle(i, 4, 5);
          probe.src = p.src;
          if (probe.complete && probe.naturalWidth) {
            settle(i, probe.naturalWidth, probe.naturalHeight);
          }
        });

        // Fallback: distribute with whatever ratios we have after 2.5s
        const t = setTimeout(() => {
          if (cancelled || pending <= 0) return;
          for (let i = 0; i < ratios.length; i++) if (ratios[i] == null) ratios[i] = 1.25;
          pending = 0;
          finalize();
        }, 2500);

        return () => { cancelled = true; clearTimeout(t); };
      }, [photos, columns]);

      // While measuring: render CSS-columns version so the user sees photos immediately
      if (!cols) {
        return (
          <div id={id} className="project-masonry">
            {photos.map((ph) => (
              <figure key={ph.id} onClick={() => onPhotoClick(ph.id)}>
                <div className="ph hover-zoom">
                  <img src={ph.src} alt={ph.caption} loading="lazy" draggable={false} onContextMenu={(e) => e.preventDefault()} />
                  <div className="ph-watermark" aria-hidden="true">© <Wordmark name={SITE.name} ampClass="wm-amp" /></div>
                </div>
              </figure>
            ))}
          </div>
        );
      }

      return (
        <div
          id={id}
          className="project-balanced"
          style={{ gridTemplateColumns: 'repeat(' + columns + ', 1fr)' }}
        >
          {cols.map((col, ci) => (
            <div key={ci} className="balanced-col">
              {col.map(ph => (
                <figure key={ph.id} onClick={() => onPhotoClick(ph.id)}>
                  <div className="ph hover-zoom">
                    <img src={ph.src} alt={ph.caption} loading="lazy" draggable={false} onContextMenu={(e) => e.preventDefault()} />
                    <div className="ph-watermark" aria-hidden="true">© <Wordmark name={SITE.name} ampClass="wm-amp" /></div>
                  </div>
                </figure>
              ))}
            </div>
          ))}
        </div>
      );
    }

    /* === Project Grid ===================================================== */
    function ProjectGrid({ project, index, onPhotoClick, photos }) {
      const PREVIEW_COUNT = 3;
      const [expanded, setExpanded] = useState(false);
      const blockRef = useRef(null);
      const visiblePhotos = expanded ? photos : photos.slice(0, PREVIEW_COUNT);
      const hiddenCount = photos.length - PREVIEW_COUNT;
      const sectionId = 'project-' + (project.title || index).toString().toLowerCase().replace(/[^a-z0-9]+/g, '-');
      const useBalanced = expanded || hiddenCount <= 0;

      const handleToggle = () => {
        // Expanding: bring the newly revealed images (the second row) to the
        // top so the user lands on the fresh content. Collapsing: return to the
        // first row so the user sees the start of the project again. The gallery
        // grows/shrinks downward, so its top stays put and a single scroll is
        // enough.
        const willExpand = !expanded;
        const scroller = blockRef.current ? blockRef.current.closest('.ab-frame') : null;
        const headerEl = document.querySelector('.site-header');
        const headerH = headerEl ? headerEl.getBoundingClientRect().height : 0;

        const scrollToRow = () => {
          const el = scroller ? scroller.querySelector('#' + sectionId) : null;
          if (!scroller || !el) return;
          const scRect = scroller.getBoundingClientRect();
          const elRect = el.getBoundingClientRect();
          // On expand, drop down by one photo's height so the first (already
          // seen) row scrolls just above and the newly revealed row leads.
          let extra = 0;
          if (willExpand) {
            const fig = el.querySelector('figure');
            extra = fig ? fig.getBoundingClientRect().height + 16 : 0;
          }
          scroller.scrollTop += (elRect.top - scRect.top) - headerH - 12 + extra;
        };

        setExpanded(willExpand);
        window.requestAnimationFrame(scrollToRow);
        setTimeout(scrollToRow, 80);
      };

      return (
        <div className="reveal project-block" ref={blockRef}>
          <div className="project-divider">
            <div className="line" />
            <div className="meta">
              <div className="num">Project {String(index + 1).padStart(2, '0')} / {String(PROJECT_ORDER.length).padStart(2, '0')}</div>
              <div className="title">{project.title}</div>
              <div className="sub">{project.subtitle} · {project.year}</div>
            </div>
            <div className="line" />
          </div>
          {useBalanced ? (
            <BalancedMasonry id={sectionId} photos={visiblePhotos} onPhotoClick={onPhotoClick} />
          ) : (
            <div id={sectionId} className="project-preview">
              {visiblePhotos.map((ph) => (
                <figure key={ph.id} onClick={() => onPhotoClick(ph.id)}>
                  <div className="ph hover-zoom">
                    <img src={ph.src} alt={ph.caption} loading="lazy" draggable={false} onContextMenu={(e) => e.preventDefault()} />
                    <div className="ph-watermark" aria-hidden="true">© <Wordmark name={SITE.name} ampClass="wm-amp" /></div>
                  </div>
                </figure>
              ))}
            </div>
          )}
          {hiddenCount > 0 && (
            <div className="project-toggle-wrap">
              <button
                type="button"
                className="project-toggle"
                aria-expanded={expanded}
                aria-controls={sectionId}
                onClick={handleToggle}
              >
                <span>{expanded ? 'Show less' : 'View all ' + photos.length + ' photos'}</span>
                <span className="chev" aria-hidden="true"><ChevronDown size={13} /></span>
              </button>
            </div>
          )}
        </div>
      );
    }

    /* === Work ============================================================= */
    function Work({ onPhotoClick }) {
      return (
        <section className="section" id="work">
          <div className="section-title reveal">
            <h2>The <em className="italic accent">Collection.</em></h2>
          </div>
          {PROJECT_ORDER.map((key, i) => {
            const project = PROJECTS[key];
            const photos = project.photos.map(id => PHOTOS.find(p => p.id === id)).filter(Boolean);
            return <ProjectGrid key={key} project={project} index={i} onPhotoClick={onPhotoClick} photos={photos} />;
          })}
        </section>
      );
    }

    /* === About ============================================================ */
    function About() {
      return (
        <section className="section alt" id="about">
          <div className="about reveal">
            <div>
              <h2>Photography that does more than <em className="italic accent">document.</em></h2>
            </div>
            <div>
              <p>
                We’re {SITE.name}, an interior and architectural photography studio based in {SITE.city}.
                We work with developers, hospitality groups, architects, and interior designers to make pictures
                that hold up where it matters: sales floors, hero banners, hoardings, and brand books.
              </p>
              <p>
                Every space has a hierarchy. Our job is to read it on site: the long view that anchors the brochure,
                the corner that sells the unit, the small detail that tells you somebody actually <em>cared</em>.
                We shoot tethered, light to feel, and deliver clean, brand-ready files.
              </p>
              <p className="secondary">
                Currently photographing hospitality, residential, and studio interiors across India.
                Recent commissions for Ira Ventures, Studio 512, Rü Craft Bar, and Lunar Cafe.
              </p>
              <div className="credentials">
                <div style={{ gridColumn: '1 / -1' }}><span className="v">Hyderabad, India</span>Available for shoots across India and beyond</div>
              </div>
            </div>
          </div>
        </section>
      );
    }

    /* === Enquire (form) =================================================== */
    const PROJECT_TYPES = ['Show Flat', 'Restaurant / Bar / Café', 'Residential', 'Hotel / Resort', 'Studio', 'Other'];

    function buildEnquiryBody(values, typesList) {
      return (
        'Name: ' + (values.name || '') + '\n' +
        'Email: ' + (values.email || '') + '\n' +
        'Phone: ' + (values.phone || '') + '\n' +
        'Studio / Brand: ' + (values.studio || '') + '\n' +
        'Project type: ' + (typesList.join(', ') || '-') + '\n\n' +
        'Message:\n' + (values.message || '')
      );
    }

    function Enquire() {
      const [types, setTypes] = useState([]);
      const [status, setStatus] = useState({ msg: '', kind: '' });
      const formRef = useRef(null);
      const toggleType = (t) => setTypes(prev => prev.includes(t) ? prev.filter(x => x !== t) : [...prev, t]);

      const collect = () => {
        const f = formRef.current;
        if (!f) return null;
        const data = new FormData(f);
        return {
          name:    (data.get('name')    || '').toString().trim(),
          email:   (data.get('email')   || '').toString().trim(),
          phone:   (data.get('phone')   || '').toString().trim(),
          studio:  (data.get('studio')  || '').toString().trim(),
          message: (data.get('message') || '').toString().trim(),
        };
      };

      const onSubmit = (e) => {
        e.preventDefault();
        const f = formRef.current;
        if (f && !f.checkValidity()) { f.reportValidity(); return; }
        const v = collect(); if (!v) return;
        const subject = encodeURIComponent('Project enquiry: ' + (v.name || 'New brief'));
        const body = encodeURIComponent(buildEnquiryBody(v, types));
        setStatus({ msg: "Opening your email. Please send the pre-filled message to complete your enquiry. We\u2019ll reply within two working days.", kind: 'success' });
        window.location.href = 'mailto:' + SITE.email + '?subject=' + subject + '&body=' + body;
      };

      const onWhatsApp = () => {
        const f = formRef.current;
        if (f && !f.checkValidity()) { f.reportValidity(); return; }
        const v = collect(); if (!v) return;
        const intro = 'Hi ' + SITE.name + ', enquiry from your portfolio.\n\n';
        const text = encodeURIComponent(intro + buildEnquiryBody(v, types));
        setStatus({ msg: "Opening WhatsApp. Please send the pre-filled message to complete your enquiry. We\u2019ll reply within two working days.", kind: 'success' });
        window.open(SITE.waHref + '?text=' + text, '_blank', 'noopener,noreferrer');
      };

      return (
        <section className="section" id="enquire">
          <div className="enquire reveal">
            <div>
              <h2>Have a space worth <em className="italic accent">photographing?</em></h2>
              <p className="lead">
                Tell us about the project: the brief, the space, the timing.
                We read every message and reply within two working days.
              </p>
              <p className="lead-meta">Full-day &amp; half-day rates · Travel across India.</p>
            </div>
            <form ref={formRef} onSubmit={onSubmit} noValidate>
              <label><span>Name <em className="required" aria-hidden="true">*</em></span><input className="field" type="text" name="name" required autoComplete="name" /></label>
              <label><span>Email <em className="required" aria-hidden="true">*</em></span><input className="field" type="email" name="email" required autoComplete="email" /></label>
              <label><span>Phone</span><input className="field" type="tel" name="phone" autoComplete="tel" /></label>
              <label><span>Studio / Brand <em className="required" aria-hidden="true">*</em></span><input className="field" type="text" name="studio" required autoComplete="organization" /></label>
              <div className="field-group">
                <span className="field-label">
                  Project type <em className="optional">(select all that apply)</em>
                </span>
                <div className="pills" role="group" aria-label="Project type">
                  {PROJECT_TYPES.map(t => (
                    <button
                      key={t}
                      type="button"
                      className="pill"
                      aria-pressed={types.includes(t)}
                      onClick={() => toggleType(t)}
                    >{t}</button>
                  ))}
                </div>
              </div>
              <label><span>Message</span><textarea className="field" rows="5" name="message" /></label>
              <div className="form-actions">
                <button className="submit" type="submit">Send enquiry</button>
                <button className="submit alt" type="button" onClick={onWhatsApp} aria-label="Send via WhatsApp">
                  Send via WhatsApp
                </button>
              </div>
              {status.msg && (
                <div className={'form-status ' + status.kind} aria-live="polite">{status.msg}</div>
              )}
            </form>
          </div>
        </section>
      );
    }

    /* === Contact ========================================================== */
    function Contact() {
      const brand = SITE.name || 'Ember & Frames';
      const mailPrefill = '?subject=' + encodeURIComponent('An interiors shoot in mind') +
        '&body=' + encodeURIComponent('Hi ' + brand + ',\n\nYour interiors & architecture work is beautiful. I\'d love to talk about a shoot. Here\'s a little about what I have in mind:\n\n');
      const waMsg = '?text=' + encodeURIComponent('Hi ' + brand + ', your interiors work is beautiful. I\'d love to talk about a shoot.');
      return (
        <section className="section alt" id="contact">
          <div className="contact reveal">
            <h2>Get in <em className="italic accent">touch.</em></h2>
            <div className="cards">
              <a className="card" href={'mailto:' + SITE.email + mailPrefill}>
                <span className="label">Email</span>
                <span className="value">{SITE.email}</span>
              </a>
              <a className="card" href={SITE.waHref + waMsg} target="_blank" rel="noopener noreferrer">
                <span className="label">WhatsApp · Phone</span>
                <span className="value">{SITE.phone}</span>
              </a>
              <div className="card">
                <span className="label">Studio</span>
                <span className="value">{SITE.city}</span>
              </div>
              <a className="card card--full" href={SITE.instagram} target="_blank" rel="noopener noreferrer">
                <span className="label">Instagram</span>
                <span className="value">{SITE.instagramHandle}</span>
              </a>
            </div>
          </div>
        </section>
      );
    }

    /* === Footer =========================================================== */
    function Footer() {
      return (
        <footer className="site-footer">
          <div className="footer-brand">
            <span className="footer-year">© {SITE.year}&nbsp;</span>
            <BrandName name={SITE.name} />
          </div>
          <span className="footer-tag">Warm. Intentional. Unforgettable.</span>
          <a href="#top">Back to top ↑</a>
        </footer>
      );
    }

    /* === App ============================================================== */
    function App() {
      const [lbIndex, setLbIndex] = useState(null);
      const [lbList, setLbList]   = useState([]);
      const frameRef = useRef(null);

      useProgressBar(frameRef);
      useRevealOnScroll(frameRef);

      const onPhotoClick = useCallback((photoId) => {
        const photo = PHOTOS.find(p => p.id === photoId);
        if (!photo) return;
        const project = PROJECTS[photo.project];
        const list = project.photos.map(id => PHOTOS.find(p => p.id === id)).filter(Boolean);
        const i = list.findIndex(p => p.id === photoId);
        setLbList(list);
        setLbIndex(Math.max(0, i));
      }, []);

      const onNav = useCallback((delta) => {
        setLbIndex(i => {
          if (i == null) return i;
          const n = lbList.length;
          return (i + delta + n) % n;
        });
      }, [lbList.length]);

      return (
        <div className="ab-frame" ref={frameRef}>
          <a href="#work" className="skip-link">Skip to work</a>
          <Header />
          <Hero />
          <Work onPhotoClick={onPhotoClick} />
          <About />
          <Contact />
          <Enquire />
          <Footer />
          {lbIndex != null && (
            <Lightbox
              photos={lbList}
              index={lbIndex}
              onClose={() => setLbIndex(null)}
              onNav={onNav}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <a class="wa-fab" href="https://wa.me/918447402780" target="_blank" rel="noopener noreferrer" aria-label="Chat on WhatsApp">
    <span class="wa-fab-label">Chat on WhatsApp</span>
    <span class="wa-fab-label">Chat on WhatsApp</span>
    <svg viewBox="0 0 32 32" aria-hidden="true"><path d="M16.001 3C9.376 3 4 8.373 4 14.99c0 2.64.875 5.105 2.36 7.121L4 29l7.062-2.297a12.05 12.05 0 0 0 4.94 1.061h.005c6.624 0 12-5.373 12-11.99 0-3.205-1.246-6.218-3.51-8.482A11.927 11.927 0 0 0 16.001 3zm0 21.97h-.004a9.96 9.96 0 0 1-5.073-1.388l-.364-.216-4.19 1.362 1.376-4.084-.237-.376a9.96 9.96 0 0 1-1.527-5.297c0-5.5 4.478-9.974 9.978-9.974 2.665 0 5.171 1.04 7.054 2.926A9.91 9.91 0 0 1 25.98 14.99c0 5.5-4.478 9.98-9.979 9.98zm5.482-7.473c-.301-.151-1.78-.878-2.056-.978-.276-.1-.477-.151-.678.151s-.778.978-.954 1.179c-.176.201-.352.226-.653.075-.301-.151-1.27-.469-2.42-1.493-.894-.798-1.498-1.785-1.674-2.087-.176-.301-.019-.464.132-.615.135-.135.301-.352.452-.527.151-.176.201-.301.301-.502.1-.201.05-.377-.025-.527-.075-.151-.678-1.633-.929-2.236-.245-.587-.494-.507-.678-.517l-.578-.01c-.201 0-.527.075-.803.377-.276.301-1.054 1.029-1.054 2.51 0 1.481 1.079 2.911 1.229 3.112.151.201 2.123 3.241 5.144 4.541.719.31 1.279.495 1.717.633.722.229 1.378.197 1.898.12.579-.087 1.78-.728 2.031-1.43.251-.703.251-1.305.176-1.43-.075-.125-.276-.201-.578-.352z"/></svg>
  </a>

  <script>
    // Personalize the WhatsApp FAB deep-link from site data, then lift it clear of
    // the footer whenever the footer scrolls into view — on every screen size — so
    // it never covers the "Back to top" link. The lift is computed from the footer's
    // position, so it sits just above the footer regardless of footer height/layout.
    (function setupFab(){
      function tryInit(retries){
        var fab = document.querySelector('.wa-fab');
        var scroller = document.querySelector('.ab-frame');
        var footer = document.querySelector('footer');
        if (!fab || !scroller || !footer) {
          if (retries > 0) return setTimeout(function(){ tryInit(retries - 1); }, 150);
          return;
        }
        var SITE = (window.PORTFOLIO_DATA && window.PORTFOLIO_DATA.SITE) || {};
        if (SITE.waHref && SITE.name) {
          var msg = 'Hi ' + SITE.name + ', your interiors work is beautiful. I\'d love to talk about a shoot.';
          fab.setAttribute('href', SITE.waHref + '?text=' + encodeURIComponent(msg));
        }
        function baseGap(){ return (window.matchMedia && window.matchMedia('(max-width: 600px)').matches) ? 16 : 22; }
        function update(){
          var sr = scroller.getBoundingClientRect();
          var fr = footer.getBoundingClientRect();
          var overlap = sr.bottom - fr.top; // how much of the footer has risen into view
          if (overlap > 0) {
            fab.style.bottom = (overlap + baseGap()) + 'px'; // sit just above the footer's top edge
          } else {
            fab.style.bottom = '';
          }
        }
        var ticking = false;
        function onScroll(){
          if (ticking) return;
          ticking = true;
          window.requestAnimationFrame(function(){ update(); ticking = false; });
        }
        scroller.addEventListener('scroll', onScroll, { passive: true });
        window.addEventListener('resize', onScroll, { passive: true });
        update();
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function(){ tryInit(20); });
      } else {
        tryInit(20);
      }
    })();
  </script>
